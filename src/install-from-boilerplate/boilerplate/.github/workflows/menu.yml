name: Run Menu

on:
  workflow_dispatch:
    inputs:
      action_type:
        description: 'Action to perform'
        required: true
        default: 'render'
        type: choice
        options:
          - render
          - topdf
          - todocx
          - freeze
          - custom-update
          - collectExternalReferences
      repository:
        description: 'Repository'
        required: false
      branch:
        description: 'Branch'
        required: false
      triggered_by:
        description: 'Triggered by'
        required: false
      freeze_label:
        description: 'Label for the snapshot (freeze action only). Leave empty to use the auto-generated version number.'
        required: false
        default: ''

jobs:
  build-and-deploy-spec:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed for pushing changes
      actions: write    # Needed to dispatch render-and-deploy.yml
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          persist-credentials: true  # We’ll use MY_PAT for push

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract output_path from JSON
        id: extract-output
        run: |
          OUTPUT_PATH=$(jq -r '.specs[0].output_path // "default/output"' specs.json)
          if [ "$OUTPUT_PATH" = "null" ] || [ -z "$OUTPUT_PATH" ]; then
            echo "Error: Unable to extract output_path from specs.json"
            exit 1
          fi
          echo "OUTPUT_PATH=$OUTPUT_PATH" >> $GITHUB_ENV

      - name: Install dependencies 🔧
        run: |
          echo "Installing dependencies..."
          npm install
          echo "Spec-Up-T version:"
          npm list spec-up-t || echo "spec-up-t not found"

      - name: Run selected script
        env:
          MY_PAT: ${{ secrets.MY_PAT }} # Make the secret available as an env var
        run: |
          case "${{ github.event.inputs.action_type }}" in
            render)
              # Rendering is handled by render-and-deploy.yml.
              # Dispatch that workflow to render and deploy to GitHub Pages.
              curl -s -X POST \
                -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${{ github.repository }}/actions/workflows/render-and-deploy.yml/dispatches" \
                -d "{\"ref\":\"${{ github.ref_name }}\"}"
              echo "render-and-deploy.yml dispatched"
              ;;
            topdf)
              npm run topdf
              ;;
            todocx)
              npm run todocx
              ;;
            freeze)
              # The freeze action creates a point-in-time snapshot of the specification.
              # Since docs/ is gitignored and not in the repo, we must:
              # 1. Render fresh (freeze needs docs/index.html to copy)
              # 2. Preserve existing frozen versions from gh-pages
              # 3. Create the new snapshot
              # Deployment to gh-pages happens in a dedicated step below.
              npm run collectExternalReferences

              # Preserve existing versions from gh-pages so they are not lost
              git fetch origin gh-pages 2>/dev/null || true
              if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
                mkdir -p /tmp/gh-pages-extract
                git archive origin/gh-pages -- versions/ 2>/dev/null \
                  | tar -x -C /tmp/gh-pages-extract 2>/dev/null || true
                if [ -d "/tmp/gh-pages-extract/versions" ]; then
                  mkdir -p docs/versions
                  cp -r /tmp/gh-pages-extract/versions/* docs/versions/
                  echo "Existing versions preserved from gh-pages"
                fi
                rm -rf /tmp/gh-pages-extract
              fi

              # Create the new snapshot
              FREEZE_LABEL="${{ github.event.inputs.freeze_label }}" npm run freeze
              ;;
            custom-update)
              npm run custom-update
              ;;
            collectExternalReferences)
              npm run collectExternalReferences
              ;;
            *)
              echo "Unknown action_type: ${{ github.event.inputs.action_type }}"
              exit 1
              ;;
          esac

      # ── Freeze-specific deployment ──────────────────────────────────────────
      # The freeze action renders and snapshots locally into docs/, which is
      # gitignored. Instead of committing to main, we deploy directly to gh-pages
      # (the same mechanism render-and-deploy.yml uses for normal renders).
      - name: Preserve CNAME from gh-pages (freeze deployment)
        if: success() && github.event.inputs.action_type == 'freeze'
        run: |
          CNAME_CONTENT=$(git show origin/gh-pages:CNAME 2>/dev/null || echo "")
          if [ -n "$CNAME_CONTENT" ]; then
            echo "$CNAME_CONTENT" > docs/CNAME
            echo "CNAME preserved: $CNAME_CONTENT"
          else
            echo "No CNAME found on gh-pages — nothing to preserve"
          fi

      - name: Deploy freeze to GitHub Pages 🚀
        if: success() && github.event.inputs.action_type == 'freeze'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages

      - name: Commit and push changes
        if: success()
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Add all changes
          git add .
          
          # Commit with appropriate message
          case "${{ github.event.inputs.action_type }}" in
            render)
              # render-and-deploy.yml already handles the commit/deploy; nothing to commit here.
              echo "Render dispatched to render-and-deploy.yml — no direct commit needed"
              ;;
            topdf)
              git commit -m "Export to PDF" || echo "No changes to commit"
              ;;
            todocx)
              git commit -m "Export to DOCX" || echo "No changes to commit"
              ;;
            collectExternalReferences)
              git commit -m "Collect external references" || echo "No changes to commit"
              ;;
            freeze)
              echo "Freeze deployed directly to gh-pages — no commit to main needed"
              ;;
            custom-update)
              git commit -m "Custom update: Copy files from spec-up-t" || echo "No changes to commit"
              ;;
            *)
              git commit -m "Update files: ${{ github.event.inputs.action_type }}" || echo "No changes to commit"
              ;;
          esac
          
          # Push changes
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}

      - name: Clean up
        if: always()
        run: |
          echo "Cleaning up..."
          rm -rf node_modules
